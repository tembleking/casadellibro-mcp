services:
  - type: web
    name: casadellibro-mcp
    runtime: image
    plan: free
    image:
      # Built and pushed by .github/workflows/image.yml. Make the GHCR package
      # public, or add registry credentials in the Render dashboard.
      url: ghcr.io/tembleking/casadellibro-mcp:latest
    # Redeploys are triggered from CI via a Render deploy hook on new images.
    autoDeploy: false
