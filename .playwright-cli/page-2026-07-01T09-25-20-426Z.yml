    - generic [ref=e161]:
      - heading "Sinopsis" [level=2] [ref=e162]
      - generic [ref=e163]:
        - text: A esta novena edición de uno de los grandes clásicos publicados en español por Unión Editorial, a los prólogos del economista Juan Ramón Rallo y del presidente argentino Javier Milei, se suma el del imprescindible economista y filósofo, periodista y profesor universitario mexicano Arturo Damm Arnal.
        - text: "Además, se suman al libro existente dos capítulos adicionales: una revisión, por parte del propio Hazlitt, de su obra magna, y un breve tratado sobre los alquileres."
        - text: Para quienes aún no se hayan adentrado en La economía en una lección, presentamos un brillante análisis de los sofismas económicos que en los últimos tiempos se han convertido en una nueva ortodoxia, a pesar de sus internas contradicciones. Actualmente, no existe en el mundo un solo gobierno importante cuya política económica no se halle influida, cuando no totalmente determinada, por alguno de estos sofismas.
        - text: El camino más corto y seguro para comprender la economía y la política económica actuales es una previa disección de los sofismas y falacias de que adolecen, singularmente de la falacia radical de la que todas parten y que, como ya puso brillantemente de relieve Frédéric Bastiat, consiste en la tendencia a considerar exclusivamente las consecuencias inmediatas de una política y sus efectos sobre un sector particular, sin reparar en las que produciría a largo plazo y sobre el conjunto de la comunidad.
