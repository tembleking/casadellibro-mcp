name: image

# Build the OCI image with nix and push it to GHCR, but only when the
# version in package.nix actually changes on master.
on:
  push:
    branches: [master]
    paths: ["package.nix"]
  # Manual trigger builds the current version regardless of change detection
  # (useful for the first publish).
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change
        id: ver
        run: |
          set -euo pipefail
          extract() { grep -E 'version[[:space:]]*=' | head -1 | sed -E 's/.*"([^"]+)".*/\1/'; }
          cur=$(extract < package.nix)
          echo "version=$cur" >> "$GITHUB_OUTPUT"

          before='${{ github.event.before }}'
          prev=""
          if [ -n "$before" ] && git cat-file -e "$before:package.nix" 2>/dev/null; then
            prev=$(git show "$before:package.nix" | extract)
          fi

          if [ "$cur" = "$prev" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "version unchanged ($cur) - skipping build"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version ${prev:-<none>} -> $cur - building"
          fi

      - uses: DeterminateSystems/nix-installer-action@main
        if: steps.ver.outputs.changed == 'true'

      - uses: DeterminateSystems/magic-nix-cache-action@main
        if: steps.ver.outputs.changed == 'true'
        with:
          use-flakehub: false

      - name: Build image with nix
        if: steps.ver.outputs.changed == 'true'
        run: nix build .#dockerImage

      - name: Log in to GHCR
        if: steps.ver.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load, tag and push to GHCR
        if: steps.ver.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          img=ghcr.io/${{ github.repository_owner }}/casadellibro-mcp
          # nix builds a docker-archive; load it (preserves entrypoint/env/cmd,
          # unlike `docker import`) and push under the GHCR tags.
          docker load -i result
          docker tag "casadellibro-mcp:$VERSION" "$img:$VERSION"
          docker tag "casadellibro-mcp:$VERSION" "$img:latest"
          docker push "$img:$VERSION"
          docker push "$img:latest"

      # Optional: set DEPLOY_HOOK_URL in repo secrets to auto-redeploy.
      - name: Trigger deploy hook
        if: steps.ver.outputs.changed == 'true'
        env:
          HOOK: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          if [ -n "${HOOK:-}" ]; then
            curl -fsSL "$HOOK"
          else
            echo "no DEPLOY_HOOK_URL secret - skipping redeploy"
          fi
